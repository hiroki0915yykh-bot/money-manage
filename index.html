<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>支出管理ダッシュボード</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0f12">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container" id="app-container" style="display: none;">
        <!-- ヘッダー -->
        <header class="header" style="position: relative;">
            <div>
                <h1 id="current-ledger-title">DashBoard</h1>
                <p>現在の支出状況 <span id="sync-status" style="color:var(--success-color); font-size:10px;">☁️同期待ち</span></p>
            </div>
            <!-- ハンバーガーメニューボタン -->
            <button id="menu-toggle-btn" class="icon-btn" style="position: absolute; right: 15px; top: 15px; font-size: 24px; padding: 0;">☰</button>
        </header>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- サマリーカード -->
            <section class="summary-section">
                <!-- 今月の支出合計 -->
                <div class="card glass">
                    <h2>今月の総支出</h2>
                    <div class="amount-display">
                        <span class="currency">¥</span>
                        <span id="total-amount" class="amount">0</span>
                    </div>
                    <div class="progress-bar-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                </div>

                <!-- 内訳 -->
                <div class="card glass breakdown">
                    <div class="breakdown-item">
                        <span class="label">固定費</span>
                        <span id="fixed-total" class="value">¥0</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="label">変動費</span>
                        <span id="variable-total" class="value">¥0</span>
                    </div>
                </div>
            </section>

            <!-- ざっくり入力エリア -->
            <section class="input-section">
                <div class="card glass mt-4">
                    <h2>📝 ざっくりメモ入力</h2>
                    <p class="hint">「コンビニ 500」のように入力して送信</p>
                    <textarea id="expense-input" placeholder="スタバ 600&#10;スーパー 1500" rows="3"></textarea>
                    <button id="submit-btn" class="primary-btn">クラウドに保存</button>
                    <div id="feedback-msg" class="feedback hidden">保存しました</div>
                </div>
            </section>

            <!-- 最近の支出リスト -->
            <section class="recent-section">
                <div class="card glass mt-4">
                    <div class="section-header">
                        <h2>📅 最近の変動費</h2>
                        <span style="font-size:12px; color:var(--text-secondary);">タップで編集</span>
                    </div>
                    <ul id="expense-list" class="expense-list">
                        <!-- Javascriptで追加 -->
                    </ul>
                </div>
            </section>
            
            <!-- 固定費リスト -->
            <section class="fixed-section" id="fixed-section-container">
                <div class="card glass mt-4">
                    <div class="section-header">
                        <h2>🏦 今月の固定費</h2>
                        <button id="open-settings-btn" class="settings-trigger">⚙️ 設定</button>
                    </div>
                    <ul id="fixed-list" class="expense-list">
                        <!-- Javascriptで追加 -->
                    </ul>
                </div>
            </section>

        </main>
    </div>

    <!-- サイドドロワーメニュー（帳簿切り替え） -->
    <div id="drawer-menu" class="drawer hidden">
        <div class="drawer-content glass">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 style="font-size:18px; color:var(--text-primary);">🗂 帳簿・用途メニュー</h2>
                <button id="close-drawer-btn" class="icon-btn" style="font-size: 24px;">×</button>
            </div>
            <p style="font-size: 12px; color:var(--text-secondary); margin-bottom:10px;">現在選択中の帳簿</p>
            <ul id="ledgers-list" class="expense-list" style="margin-bottom: 24px;">
                <!-- Javascriptで追加 -->
            </ul>
            <button id="open-add-ledger-btn" class="primary-btn small-btn" style="background:var(--card-bg); border: 1px solid var(--accent-gradient);">＋ 新しい用途を追加</button>
        </div>
    </div>

    <!-- データベース未設定時のエラー表示エリア -->
    <div id="setup-container" style="display: none; padding: 40px 20px; text-align: center;">
        <h2>データベースの設定が必要です</h2>
        <p style="color:var(--text-secondary); margin-top:20px;">
            セキュリティの設定が確認できません。<br>
            ここに「マジックリンク」のURL全体を全選択してコピペしてください。
        </p>
        <div style="margin-top: 30px;">
            <input type="text" id="magic-link-input" placeholder="https://hiroki0915..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff;">
            <button id="set-magic-link-btn" class="primary-btn" style="margin-top: 15px;">👉 リンク設定を記憶する</button>
        </div>
    </div>

    <!-- 固定費・サブスク設定モーダル -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 style="color: var(--text-primary);">⚙️ 固定費の編集</h2>
                <button id="close-modal-btn" class="icon-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="add-fixed-form">
                    <input type="text" id="fixed-name-input" placeholder="項目名 (例: 家賃)">
                    <input type="number" id="fixed-amount-input" placeholder="金額 (例: 80000)">
                    <button id="add-fixed-btn" class="primary-btn small-btn">リストに追加</button>
                </div>
                <h3 style="font-size:14px; color:var(--text-secondary); margin-top:24px; margin-bottom:8px;">現在の登録済リスト</h3>
                <ul id="edit-fixed-list" class="expense-list">
                    <!-- Javascriptで追加 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- 変動費の編集・削除モーダル -->
    <div id="edit-variable-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 style="color: var(--text-primary);">✏️ 変動費の編集</h2>
                <button id="close-var-modal-btn" class="icon-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="add-fixed-form">
                    <input type="text" id="edit-var-name-input" placeholder="項目名">
                    <input type="number" id="edit-var-amount-input" placeholder="金額">
                    <input type="hidden" id="edit-var-id-input">
                    <!-- 保存と削除ボタンを並べる -->
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button id="save-var-btn" class="primary-btn small-btn" style="flex: 2; margin-top: 0;">保存する</button>
                        <button id="delete-var-btn" class="delete-btn" style="flex: 1; margin-top: 0; font-size: 14px; padding: 12px;">🗑 削除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新しい用途（帳簿）追加モーダル -->
    <div id="add-ledger-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 style="color: var(--text-primary);">＋ 新しい用途の追加</h2>
                <button id="close-ledger-modal-btn" class="icon-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="add-fixed-form">
                    <input type="text" id="new-ledger-name" placeholder="用途名 (例: 海外生活用)">
                    <input type="number" id="new-ledger-budget" placeholder="専用予算 (例: 500000)">
                    <button id="create-ledger-btn" class="primary-btn mt-4">用途を作成</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
